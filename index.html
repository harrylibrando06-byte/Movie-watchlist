<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TO-D0 fucking list</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="container" class="animate-slide-up">
      <div id="header">
        <h1 class="animate-fade-in">TO-D0 Fucking list</h1>
        <search>
          <input type="text" id="searchBar" placeholder="search" />
          <button id="searchBtn">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              height="24px"
              viewBox="0 -960 960 960"
              width="24px"
              fill="#e3e3e3"
            >
              <path
                d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z"
              />
            </svg>
          </button>
        </search>
      </div>
      <div id="displayArea">
        <div id="movie"></div>
        <!--heres goes the arrays or the list-->
      </div>
      <fieldset id="fieldset">
        <legend>
          Search result
          <p id="searchResult"></p>
        </legend>
      </fieldset>
      <div id="bottomInputs">
        <input
          type="text"
          id="movieInput"
          placeholder="To do to add
        "
        />
        <button id="addToStart-Btn">Add to start</button>
        <button id="addToEnd-Btn">Add to end</button>
        <button id="removeFirstMovie">Finish First</button>
        <button id="removeLastMovie">Finish Last</button>
        <button id="randomMovie">Pick for you</button>
        <button id="clear">Clear all</button>
      </div>
      <p id="randomResult"></p>
    </div>
    <script src="script.js" defer></script>
  </body>
</html>
